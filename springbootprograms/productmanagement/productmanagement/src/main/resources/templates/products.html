<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            width: 90%;
            margin: auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .add-btn {
            text-decoration: none;
            background-color: #28a745;
            color: white;
            padding: 10px 16px;
            border-radius: 5px;
            font-weight: bold;
        }

        .add-btn:hover {
            background-color: #218838;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background-color: #007bff;
            color: white;
        }

        table th, table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        table tr:hover {
            background-color: #f1f1f1;
        }

        .edit-btn {
            text-decoration: none;
            background-color: #ffc107;
            color: black;
            padding: 6px 12px;
            border-radius: 4px;
            margin-right: 5px;
        }

        .edit-btn:hover {
            background-color: #e0a800;
        }

        .delete-btn {
            text-decoration: none;
            background-color: #dc3545;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>All Products</h1>

    <div th:if="${errorMessage}" class="error">
        <p th:text="${errorMessage}"></p>
    </div>

    <div class="top-bar">
        <div></div>
        <a href="/products/add" class="add-btn">+ Add Product</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.price}"></td>
                <td th:text="${product.quantity}"></td>
                <td th:text="${product.category}"></td>
                <td>
                    <a th:href="@{'/products/edit/' + ${product.id}}" class="edit-btn">Edit</a>
                    <a th:href="@{'/products/delete/' + ${product.id}}"
                       class="delete-btn"
                       onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
